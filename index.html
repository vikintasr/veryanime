<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Very Anime Playoffs</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page-shell">
      <header class="hero">
        <p class="eyebrow">Fat Slob Skins Tournament</p>
        <h1>Very Anime Playoffs</h1>
      </header>

      <aside id="previewPane" class="preview-pane">
        <img id="previewImage" alt="" />
        <p id="previewName">Hover or drag a skin</p>
      </aside>

      <section class="bracket-board">
        <div class="bracket">
          <section id="leftConference" class="conference"></section>

          <section class="grand-final">
            <h2 class="conference-title">Grand Final</h2>
            <div class="trophy">Very Anime Supreme</div>
            <article class="slot final-slot" data-slot="final-left">Left Winner</article>
            <article class="slot final-slot" data-slot="final-right">Right Winner</article>
            <article class="slot champion-slot" data-slot="champion">Most Anime Skin Alive</article>
          </section>

          <section id="rightConference" class="conference right"></section>
        </div>
      </section>
    </main>

    <script src="./bracket.js"></script>
  </body>
</html>
